repos:
  # Standard file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: 'package-lock\.json'

  # Formatting (manages its own prettier binary — no npm dep needed)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, json, yaml, markdown]

  # Project-specific checks
  - repo: local
    hooks:
      - id: typecheck
        name: TypeScript type check
        language: system
        entry: npm run typecheck
        pass_filenames: false
        types: [ts]

      - id: tests
        name: Run tests
        language: system
        entry: npm test
        pass_filenames: false
        types: [ts]

      - id: npm-install
        name: Sync node_modules when package-lock.json changes
        language: system
        entry: npm install
        pass_filenames: false
        stages: [post-merge, post-checkout]
        files: package-lock\.json
